<div class=" libry libry-list-item">
    <div class="libry-cover">
        <a href="{% url 'library-library' recipe.id %}">
            <img src={{recipe.cover.url}} alt="">
        </a>
    </div>
    <div class="libry-title-container">
        <h2 class="libry-title">
            <a href="{% url 'library-library' recipe.id %}">
                {{recipe.title}}
        </h2>
        </a>
    </div>

    <div class="libry-author">
        <span class="libry-author-item">
            <i class="fas fa-user"></i>
            {{recipe.author.first_name}} {{recipe.author.last_name}}
        </span>
        <span class="libry-author-item">
            <i class="fas fa-calendar-alt"></i>
            {{ recipe.created_at|date:"d/m/Y" }}
        </span>
        <span class="libry-author-item">
            <a href="/recipes/category/romanse/">
                <i class="fas fa-layer-group"></i>
                <span>{{recipe.category.name}}</span>
            </a>
        </span>
    </div>

    <div class="libry-content">
        <p>{{recipe.description}}</p>
    </div>


    <div class="libry-preco-container">
        <div class="libry-meta">
            <span class="libry-moeda">R$</span>
            <span class="libry-valor">{{recipe.price_decimal}}</span>
        </div>

    </div>

    {% if is_detail_page is True %}
    <footer class="libry-footer">
        <a href="{% url 'library-library' recipe.id %}" class="libry-read-more button-dark button-full-width">
            <i class="fas fa-shopping-bag"></i>
            <span>Comprar</span>
        </a>
    </footer>
    {% else %}
    <footer class="libry-footer">
        <a href="{% url 'library-library' recipe.id %}" class="libry-read-more button-dark button-full-width">
            <i class="fas fa-eye"></i>
            <span>Ver mais...</span>
        </a>
    </footer>
    {% endif %}

</div>
